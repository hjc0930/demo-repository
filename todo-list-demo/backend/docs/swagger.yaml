basePath: /api/v1
definitions:
  model.CreateTodoReq:
    properties:
      description:
        maxLength: 2000
        type: string
      dueDate:
        type: string
      priority:
        type: integer
      status:
        type: integer
      title:
        maxLength: 255
        minLength: 1
        type: string
    required:
    - title
    type: object
  model.PageResult:
    properties:
      list: {}
      page:
        type: integer
      pageSize:
        type: integer
      total:
        type: integer
    type: object
  model.Result:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  model.Todo:
    properties:
      createdAt:
        type: string
      description:
        type: string
      dueDate:
        type: string
      id:
        type: integer
      priority:
        type: integer
      status:
        type: integer
      title:
        type: string
      updatedAt:
        type: string
    type: object
  model.UpdateTodoReq:
    properties:
      description:
        maxLength: 2000
        type: string
      dueDate:
        type: string
      priority:
        type: integer
      status:
        type: integer
      title:
        maxLength: 255
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Todo 管理系统 API
  title: Todo API
  version: "1.0"
paths:
  /api/v1/todos:
    get:
      consumes:
      - application/json
      description: 分页获取Todo列表，支持按状态筛选
      parameters:
      - description: '状态: 0=待办, 1=进行中, 2=已完成'
        in: query
        name: status
        type: integer
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页条数
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.Result'
            - properties:
                data:
                  $ref: '#/definitions/model.PageResult'
              type: object
      summary: 获取Todo列表
      tags:
      - Todo管理
    post:
      consumes:
      - application/json
      description: 创建一个新的Todo
      parameters:
      - description: 创建Todo请求
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.CreateTodoReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.Result'
            - properties:
                data:
                  $ref: '#/definitions/model.Todo'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.Result'
      summary: 创建Todo
      tags:
      - Todo管理
  /api/v1/todos/{id}:
    delete:
      consumes:
      - application/json
      description: 软删除Todo
      parameters:
      - description: Todo ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Result'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.Result'
      summary: 删除Todo
      tags:
      - Todo管理
    get:
      consumes:
      - application/json
      description: 根据ID获取Todo详情
      parameters:
      - description: Todo ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.Result'
            - properties:
                data:
                  $ref: '#/definitions/model.Todo'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.Result'
      summary: 获取Todo详情
      tags:
      - Todo管理
    put:
      consumes:
      - application/json
      description: 部分更新Todo
      parameters:
      - description: Todo ID
        in: path
        name: id
        required: true
        type: integer
      - description: 更新Todo请求
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.UpdateTodoReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.Result'
            - properties:
                data:
                  $ref: '#/definitions/model.Todo'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.Result'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.Result'
      summary: 更新Todo
      tags:
      - Todo管理
swagger: "2.0"
